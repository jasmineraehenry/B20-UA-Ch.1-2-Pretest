    let currentQuestionIndex = 0;
    let score = 0;
    let answered = false;

    // DOM Elements
    const questionText = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options-container");
    const progressText = document.getElementById("progress-text");
    const submitBtn = document.getElementById("submit-btn");
    const nextBtn = document.getElementById("next-btn");
    const feedbackArea = document.getElementById("feedback-area");
    const feedbackStatus = document.getElementById("feedback-status");
    const feedbackRationale = document.getElementById("feedback-rationale");

    function loadQuestion() {
        answered = false;
        const currentQ = quizData[currentQuestionIndex];
        
        progressText.innerText = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
        questionText.innerText = currentQ.question;
        
        // Reset and populate options
        optionsContainer.innerHTML = "";
        currentQ.answerOptions.forEach((option, index) => {
            const label = document.createElement("label");
            label.className = "option-label";
            label.innerHTML = `
                <input type="radio" name="quiz-option" value="${index}">
                ${option.text}
            `;
            // Add click event to handle highlighting selection
            label.onclick = function() {
                if (!answered) {
                    document.querySelectorAll('.option-label').forEach(el => el.classList.remove('selected'));
                    label.classList.add('selected');
                    label.querySelector('input').checked = true;
                }
            };
            optionsContainer.appendChild(label);
        });

        // Reset UI elements
        submitBtn.style.display = "inline-block";
        submitBtn.disabled = false;
        nextBtn.style.display = "none";
        feedbackArea.style.display = "none";
        feedbackArea.className = "feedback-area";
    }

    function checkAnswer() {
        const selectedOption = document.querySelector('input[name="quiz-option"]:checked');
        
        if (!selectedOption) {
            alert("Please select an answer before submitting!");
            return;
        }

        answered = true;
        submitBtn.disabled = true;
        submitBtn.style.display = "none";
        
        const selectedIndex = parseInt(selectedOption.value);
        const currentQ = quizData[currentQuestionIndex];
        const chosenAnswer = currentQ.answerOptions[selectedIndex];
        
        // Disable all clicks on options
        document.querySelectorAll('.option-label').forEach(el => el.style.pointerEvents = "none");

        // Provide Feedback
        feedbackArea.style.display = "block";
        feedbackRationale.innerText = chosenAnswer.rationale;

        if (chosenAnswer.isCorrect) {
            score++;
            feedbackArea.classList.add("feedback-correct");
            feedbackStatus.innerText = "Correct!";
            feedbackStatus.style.color = "#198754";
        } else {
            feedbackArea.classList.add("feedback-incorrect");
            feedbackStatus.innerText = "Incorrect.";
            feedbackStatus.style.color = "#dc3545";
        }

        nextBtn.style.display = "inline-block";
    }

    function nextQuestion() {
        currentQuestionIndex++;
        
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            showFinalScore();
        }
    }

    function showFinalScore() {
        document.getElementById("quiz-container").style.display = "none";
        document.getElementById("score-container").style.display = "block";
        document.getElementById("final-score").innerText = `${score} / ${quizData.length}`;
    }

    // Initialize Quiz
    loadQuestion();
</script>
